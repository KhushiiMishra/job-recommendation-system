<h2 class="mb-4 text-center">🚀 AI Job Recommendations</h2>
<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Job Results</title>
</head>

<style>
    .progress-container{
        background: #ddd;
        border-radius: 10px;
        overflow: hidden;
    }
    .progress-bar{
        background: #4caf50;
        color: white;
        padding: 5px;
    }
</style>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4 text-center">🚀 Recommended Jobs</h2>
    <h3>🧠 Skills Detected</h3>

<div>
    {% for skill in skills %}
        <span style="background:#007BFF; color:white; padding:5px 10px; border-radius:20px; margin:5px; display:inline-block;">
            {{ skill }}
        </span>
    {% endfor %}
</div>
     {% for job, percent, link  in jobs %}
    <div class="card shadow-sm mb-4 p-3">
         <h3><i class="fas fa-briefcase"></i> {{Job}}</h3>
        <p class="text-muted">Match Score:{{percent}}%</p>
        <div class="progress mb-3">
            <div class="progress-bar bg-success"style="width: {{ percent }}%;">
                {{ percent }}%
            </div>
        </div>
        <a href="{{link}}" target="_blank" style="background: #007BFF; color: white; padding: 8px 12px;
         border-radius: 5px;text-decoration: none;"> <i class="fas fa-paper-plane"></i> Apply on Platform</a>
       

    </div>

    {% endfor %}

</div>

</body>
</html>
